spring:
  datasource:
    url: jdbc:h2:mem:winga_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  mail:
    host: localhost
    port: 1025

app:
  jwt:
    secret: test_secret_key_winga_test_environment_only
    expiration-ms: 3600000
    refresh-expiration-ms: 7200000
  platform:
    commission-rate: 0.10
