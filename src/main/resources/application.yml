server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: winga-backend

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # ─── Database ────────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3306/winga_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Africa/Dar_es_Salaam
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}   # XAMPP default: tupu (empty). Weka password ikiwa umeibadilisha.
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: WingaHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ─── JPA / Hibernate ─────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update          # use 'validate' or 'none' in production
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          time_zone: Africa/Dar_es_Salaam

  # ─── Mail (OTP & notifications) — winga@ericksky.online ───────────────────────
  mail:
    host: ${MAIL_HOST:mail.ericksky.online}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:winga@ericksky.online}
    password: ${MAIL_PASSWORD:ESNyarobi@1234}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
        # If using port 465 instead, set MAIL_PORT=465 and smtp.ssl.enable: true

# ─── JWT Configuration ──────────────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:W1ng@_S3cur3_JWT_S3cr3t_K3y_TZ_Marketpl@c3_2024!}
    expiration-ms: 86400000          # 24 hours
    refresh-expiration-ms: 604800000  # 7 days
    registration-token-expiration-ms: 900000  # 15 min (for complete registration after OTP)

  # OTP for email-based register & login (in-memory; use Redis in production)
  otp:
    expiry-minutes: 10

  # ─── Platform Business Rules ─────────────────────────────────────────────────
  platform:
    commission-rate: 0.15            # 15% platform fee (Winga commission on completed jobs)
    subscription-days: 30           # Provider subscription validity (days)
    currency: TZS
    name: Winga
    support-email: support@winga.co.tz
    # Payment facilitation margins (e.g. 0.01 = 1% on top of transaction)
    mpesa-margin: 0.01
    tigo-margin: 0.01
    airtel-margin: 0.01
    referral-signup-commission: 500   # TZS per signup via referral link
    referral-base-url: ${REFERRAL_BASE_URL:https://winga.co.tz}

  # ─── M-Pesa Daraja (TZ/KE) — weka credentials for live STK push ───────────────
  mpesa:
    enabled: ${MPESA_ENABLED:false}
    base-url: ${MPESA_BASE_URL:https://sandbox.safaricom.co.ke}
    consumer-key: ${MPESA_CONSUMER_KEY:}
    consumer-secret: ${MPESA_CONSUMER_SECRET:}
    shortcode: ${MPESA_SHORTCODE:}
    passkey: ${MPESA_PASSKEY:}
    callback-url: ${MPESA_CALLBACK_URL:http://localhost:8080/api/payments/callback}

  # ─── File upload (local storage) ─────────────────────────────────────────────
  upload:
    dir: ${UPLOAD_DIR:./uploads}
    allowed-types: image/jpeg,image/png,image/webp,image/gif,application/pdf
    max-file-size-bytes: 10485760   # 10MB

  # ─── CORS ────────────────────────────────────────────────────────────────────
  cors:
    allowed-origins-extra: ${APP_CORS_ALLOWED_ORIGINS:}   # Production: comma-separated e.g. https://sokokuuonline.co.tz,https://admin.sokokuuonline.co.tz
    allowed-origins:
      - http://localhost:3000
      - http://localhost:3001
      - http://localhost:5173
      - http://localhost:5174   # Admin dashboard (Vite)
      - https://winga.co.tz

# ─── OpenAPI / Swagger ──────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
  info:
    title: Winga Freelance Marketplace API
    description: >
      Tanzania's premier freelance marketplace — secure escrow, real-time chat,
      mobile money integration (M-Pesa / Tigo Pesa).
    version: v1.0.0
    contact:
      name: Winga Team
      email: dev@winga.co.tz

# ─── Actuator ───────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ─── Logging ────────────────────────────────────────────────────────────────────
logging:
  level:
    com.winga: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(%5p) %clr(${PID}){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"
